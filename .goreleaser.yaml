version: 2

project_name: caw

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: caw
    main: ./cmd/caw
    binary: caw
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}
    goos:
      - windows
    goarch:
      - amd64

archives:
  - id: default
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: derekurban
    name: codex-auth-wrapper
  prerelease: auto
  draft: false
  footer: |
    ## Install
    ### Go
    ```bash
    go install github.com/derekurban/codex-auth-wrapper/cmd/caw@{{ .Tag }}
    ```

    ### Windows PowerShell installer
    ```powershell
    iwr https://raw.githubusercontent.com/derekurban/codex-auth-wrapper/main/scripts/install.ps1 -useb | iex
    ```
